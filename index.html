<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HVS Compact - Boss</title>
    <style>
        :root { --green-bg: #c6e0b4; --yellow-bg: #ffe699; --orange-bg: #f8cbad; --border-color: #444; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 8px; background-color: #f0f2f5; font-size: 13px; }
        .container { max-width: 100%; margin: auto; background: white; padding: 12px; border-radius: 8px; }
        .setup-section { background: #f8f9fa; padding: 8px; border-radius: 6px; margin-bottom: 12px; display: flex; gap: 10px; border: 1px solid #ddd; }
        select, input { padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 15px; }
        .table-responsive { width: 100%; overflow-x: auto; margin-bottom: 15px; border: 1px solid var(--border-color); }
        table { width: 100%; min-width: 340px; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid var(--border-color); text-align: center; padding: 4px 1px; }
        .header-green { background-color: var(--green-bg); font-weight: bold; font-size: 12px; }
        .label-cell { text-align: left; padding-left: 5px; font-weight: bold; width: 65px; background: #fdfdfd; font-size: 12px; }
        .total-cell { background-color: #eee; font-weight: bold; width: 45px; font-size: 12px; }
        .sun-column { background-color: #fff0f0; color: red; }
        input.cell-input { width: 100%; border: none; text-align: center; font-size: 16px; outline: none; background: transparent; font-weight: bold; padding: 2px 0; }
        .summary-wrapper { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; border-top: 2px solid #eee; padding-top: 15px; }
        .salary-table { width: 100%; border: 1px solid var(--border-color); }
        .salary-table input { border: none; text-align: right; font-weight: bold; font-size: 15px; background: #fffdf0; width: 100%; padding: 4px; }
        .salary-table td { padding: 8px; border: 1px solid #ddd; }
        .btn-save { background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 6px; font-weight: bold; width: 100%; font-size: 16px; margin-bottom: 10px; cursor: pointer; }
        .final-row { background-color: var(--yellow-bg); font-weight: bold; font-size: 1.15em; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; margin: 0 0 10px 0; font-size: 1.1rem;">QUẢN LÝ CÔNG HVS</h2>

    <div class="setup-section">
        <select id="month-select" onchange="renderCalendar()" style="flex:2"></select>
        <input type="number" id="year-select" value="2026" onchange="renderCalendar()" style="flex:1">
    </div>

    <div id="calendar-content"></div>

    <div class="summary-wrapper">
        <button class="btn-save" onclick="saveData()">LƯU DỮ LIỆU</button>
        
        <table style="width: 100%; margin-bottom: 5px;">
            <tr><td class="label-cell" style="background:var(--green-bg)">Tổng Thường</td><td id="res-thuong" style="font-weight:bold; text-align:right; padding-right:10px">0</td></tr>
            <tr><td class="label-cell" style="background:var(--orange-bg)">Tổng OVT</td><td id="res-ovt" style="font-weight:bold; text-align:right; padding-right:10px">0</td></tr>
            <tr><td class="label-cell" style="background:#ffdada; color:red;">Tổng CN</td><td id="res-cn" style="font-weight:bold; text-align:right; padding-right:10px; color:red;">0</td></tr>
        </table>

        <table class="salary-table">
            <tr><td class="label-cell" style="width:120px">LCB</td><td><input type="number" id="in-lcb" value="11110000" oninput="calculate()"></td></tr>
            <tr><td class="label-cell">Thêm giờ</td><td id="lbl-ovt-money" style="font-weight:bold; text-align:right;">0</td></tr>
            <tr><td class="label-cell">PC Chức vụ</td><td><input type="number" id="in-pc-chucvu" value="1600000" oninput="calculate()"></td></tr>
            <tr><td class="label-cell">PC C.Việc</td><td><input type="number" id="in-pc-congviec" value="750000" oninput="calculate()"></td></tr>
            <tr><td class="label-cell">PC Thâm niên</td><td><input type="number" id="in-pc-thamnien" value="590000" oninput="calculate()"></td></tr>
            <tr style="color: #666; font-size: 0.9em;">
                <td class="label-cell">Bảo hiểm (10.5%)</td>
                <td id="lbl-bh-total" style="text-align:right;">0</td>
            </tr>
            <tr class="final-row">
                <td class="label-cell">THỰC NHẬN</td>
                <td id="lbl-total" style="color: #d9534f; text-align:right;">0</td>
            </tr>
        </table>
    </div>
</div>

<script>
    const daysOfWeek = ["T2", "T3", "T4", "T5", "T6", "T7", "CN"];

    function init() {
        const monthSel = document.getElementById('month-select');
        for(let i=0; i<12; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.text = "Tháng " + (i+1);
            monthSel.add(opt);
        }
        monthSel.value = new Date().getMonth();
        renderCalendar();
    }

    function renderCalendar() {
        const month = parseInt(document.getElementById('month-select').value);
        const year = parseInt(document.getElementById('year-select').value);
        const container = document.getElementById('calendar-content');
        container.innerHTML = '';

        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0).getDate();
        let startPos = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;

        let dayCounter = 1;
        while (dayCounter <= lastDay) {
            let wrap = document.createElement('div');
            wrap.className = 'table-responsive';
            let table = document.createElement('table');
            let hRow = `<tr class="header-green"><td class="label-cell">Thứ</td>`, 
                dRow = `<tr class="header-green"><td class="label-cell">Ngày</td>`, 
                tRow = `<tr><td class="label-cell">Thường</td>`, 
                oRow = `<tr><td class="label-cell">OVT</td>`;
            
            for (let i = 0; i < 7; i++) {
                let isSun = (i === 6);
                hRow += `<td class="${isSun ? 'sun-column' : ''}">${daysOfWeek[i]}</td>`;
                if ((dayCounter === 1 && i < startPos) || dayCounter > lastDay) {
                    dRow += '<td></td>'; tRow += '<td></td>'; oRow += '<td></td>';
                } else {
                    dRow += `<td class="${isSun ? 'sun-column' : ''}">${dayCounter}</td>`;
                    // Đánh dấu ô CN bằng class 'is-sun' cho cả 2 hàng
                    tRow += `<td class="${isSun ? 'sun-column' : ''}"><input type="number" class="cell-input in-t ${isSun ? 'is-sun' : ''}" data-day="${dayCounter}" oninput="calculate()"></td>`;
                    oRow += `<td class="${isSun ? 'sun-column' : ''}"><input type="number" class="cell-input in-o ${isSun ? 'is-sun' : ''}" data-day="${dayCounter}" oninput="calculate()"></td>`;
                    dayCounter++;
                }
            }
            hRow += '<td class="total-cell">TỔNG</td></tr>'; dRow += '<td></td></tr>';
            tRow += '<td class="total-cell w-t">0</td></tr>'; oRow += '<td class="total-cell w-o">0</td></tr>';
            table.innerHTML = hRow + dRow + tRow + oRow;
            wrap.appendChild(table);
            container.appendChild(wrap);
            startPos = 0;
        }
        loadSavedData(); calculate();
    }

    // HÀM TÍNH TOÁN THEO CÔNG THỨC MỚI
    function calculate() {
        let totalThuongNgayThuong = 0;
        let totalOVTNgayThuong = 0;
        let totalChuNhat = 0;

        document.querySelectorAll('.table-responsive').forEach(wrap => {
            let weeklyT = 0; // Tổng thường cả tuần (bao gồm CN)
            let weeklyO = 0; // Tổng OVT cả tuần (bao gồm CN)
            
            // Duyệt hàng Thường
            wrap.querySelectorAll('.in-t').forEach(input => {
                let val = Number(input.value) || 0;
                weeklyT += val;
                if (input.classList.contains('is-sun')) {
                    totalChuNhat += val; // Nếu là Thường CN -> cộng vào Tổng CN
                } else {
                    totalThuongNgayThuong += val; // Nếu là Thường ngày thường -> cộng vào Tổng Thường
                }
            });

            // Duyệt hàng OVT
            wrap.querySelectorAll('.in-o').forEach(input => {
                let val = Number(input.value) || 0;
                weeklyO += val;
                if (input.classList.contains('is-sun')) {
                    totalChuNhat += val; // Nếu là OVT CN -> cộng vào Tổng CN
                } else {
                    totalOVTNgayThuong += val; // Nếu là OVT ngày thường -> cộng vào Tổng OVT
                }
            });

            // Cập nhật cột TỔNG ở cuối mỗi tuần (giữ nguyên hiển thị tổng cộng của tuần)
            wrap.querySelector('.w-t').innerText = weeklyT;
            wrap.querySelector('.w-o').innerText = weeklyO;
        });

        // Đổ dữ liệu ra bảng tổng hợp theo đúng công thức yêu cầu
        document.getElementById('res-thuong').innerText = totalThuongNgayThuong;
        document.getElementById('res-ovt').innerText = totalOVTNgayThuong;
        document.getElementById('res-cn').innerText = totalChuNhat;

        // TÍNH LƯƠNG (Dựa trên tổng OVT ngày thường + tổng công CN)
        const lcb = Number(document.getElementById('in-lcb').value) || 0;
        const pccv = Number(document.getElementById('in-pc-chucvu').value) || 0;
        const pctn = Number(document.getElementById('in-pc-thamnien').value) || 0;
        const pccviec = Number(document.getElementById('in-pc-congviec').value) || 0;

        const luongGio = Math.round(lcb / 208);
        
        // Tiền thêm giờ = (Tổng OVT ngày thường * 1.5) + (Tổng CN * 2.0)
        // Lưu ý: Tôi giả định CN nhân hệ số 2.0, bạn có thể chỉnh con số này
        const tienOvt = Math.round((totalOVTNgayThuong * luongGio * 1.5) + (totalChuNhat * luongGio * 2.0));
        
        const bhTotal = Math.round(lcb * 0.105);
        const final = (lcb + tienOvt + pccv + pctn + pccviec) - bhTotal;

        document.getElementById('lbl-ovt-money').innerText = tienOvt.toLocaleString();
        document.getElementById('lbl-bh-total').innerText = bhTotal.toLocaleString();
        document.getElementById('lbl-total').innerText = final.toLocaleString() + " ₫";
    }

    function saveData() {
        const month = document.getElementById('month-select').value;
        const year = document.getElementById('year-select').value;
        const data = { thuong: {}, ovt: {}, salary: {} };
        document.querySelectorAll('.in-t').forEach(i => { if(i.dataset.day) data.thuong[i.dataset.day] = i.value });
        document.querySelectorAll('.in-o').forEach(i => { if(i.dataset.day) data.ovt[i.dataset.day] = i.value });
        data.salary = { lcb: document.getElementById('in-lcb').value, pccv: document.getElementById('in-pc-chucvu').value, pccviec: document.getElementById('in-pc-congviec').value, pctn: document.getElementById('in-pc-thamnien').value };
        localStorage.setItem(`hvs_data_${year}_${month}`, JSON.stringify(data));
        alert("Đã lưu dữ liệu!");
    }

    function loadSavedData() {
        const month = document.getElementById('month-select').value;
        const year = document.getElementById('year-select').value;
        const saved = localStorage.getItem(`hvs_data_${year}_${month}`);
        if (saved) {
            const data = JSON.parse(saved);
            document.querySelectorAll('.in-t').forEach(i => { if(data.thuong[i.dataset.day]) i.value = data.thuong[i.dataset.day] });
            document.querySelectorAll('.in-o').forEach(i => { if(data.ovt[i.dataset.day]) i.value = data.ovt[i.dataset.day] });
            if(data.salary) {
                document.getElementById('in-lcb').value = data.salary.lcb;
                document.getElementById('in-pc-chucvu').value = data.salary.pccv;
                document.getElementById('in-pc-congviec').value = data.salary.pccviec;
                document.getElementById('in-pc-thamnien').value = data.salary.pctn;
            }
        }
    }
    window.onload = init;
</script>
</body>
</html>
